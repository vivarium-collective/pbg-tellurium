name: steady-state
description: "Tellurium / Antimony steady-state solver: computes equilibrium concentrations for a model using RoadRunner's steadyState(). Emits the steady-state species map as 'concentrations'."
tags: [systems-biology, steady-state, sbml, demo]

requires:
  processes: [TelluriumSteadyStateStep, RAMEmitter]

parameters:
  model:
    type: string
    default: |
      model decay
        S1 = 10; S2 = 0
        S1 -> S2; k*S1; k = 0.3
      end
    description: "Antimony (or SBML) model source string."
  model_format:
    type: string
    default: "antimony"
    description: "Model format: 'antimony' or 'sbml'."

state:
  steady_state:
    _type: step
    address: "local:TelluriumSteadyStateStep"
    config:
      model: "${model}"
      model_format: "${model_format}"
    inputs: {}
    outputs:
      steady_state_concentrations: ["ss_results", "concentrations"]
  ss_results:
    concentrations: {}
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit:
        concentrations: "map[float]"
    inputs:
      concentrations: ["ss_results", "concentrations"]
